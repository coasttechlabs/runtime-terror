<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Runtime Terror - Game Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0d11;
      --panel: #12161c;
      --line: #1cff7a;
      --line-soft: rgba(28, 255, 122, 0.45);
      --text: #d9dce2;
      --muted: #8c93a3;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Share Tech Mono", monospace;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 8%, rgba(34, 66, 45, 0.25), transparent 46%),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.01), rgba(255, 255, 255, 0.01) 2px, transparent 2px, transparent 36px),
        linear-gradient(180deg, #0f1319 0%, #080b0f 100%);
      display: flex;
      flex-direction: column;
    }

    .site-header {
      border-bottom: 2px solid var(--line);
      padding: 18px 38px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: rgba(8, 11, 15, 0.78);
      backdrop-filter: blur(4px);
    }

    .brand {
      margin: 0;
      color: var(--line);
      font-family: "Special Elite", monospace;
      letter-spacing: 2px;
      font-size: clamp(1.4rem, 2.7vw, 2.2rem);
      text-shadow: 0 0 9px rgba(141, 255, 189, 0.55);
    }

    .nav {
      display: flex;
      gap: 34px;
      flex-wrap: wrap;
    }

    .nav a {
      color: #f2f2f2;
      text-decoration: none;
      font-size: clamp(1rem, 1.6vw, 1.45rem);
      font-family: "Special Elite", monospace;
      opacity: 0.92;
      transition: opacity 140ms ease, text-shadow 140ms ease;
    }

    .nav a:hover {
      opacity: 1;
      text-shadow: 0 0 8px rgba(141, 255, 189, 0.38);
    }

    .frame {
      margin: 52px auto 30px;
      width: min(960px, calc(100% - 24px));
      min-height: 560px;
      background: var(--panel);
      border: 2px solid var(--line-soft);
      box-shadow: 0 0 0 1px rgba(28, 255, 122, 0.18), 0 12px 40px rgba(0, 0, 0, 0.42);
      overflow: hidden;
      padding: 30px 28px 34px;
      animation: fade-in 380ms ease-out;
    }

    .top {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 64px;
    }

    .search {
      width: min(360px, 100%);
      border: 2px solid rgba(188, 199, 224, 0.44);
      background: rgba(5, 7, 10, 0.45);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 13px;
      transition: border-color 120ms ease, box-shadow 120ms ease;
    }

    .search:focus-within {
      border-color: var(--line);
      box-shadow: 0 0 0 2px rgba(28, 255, 122, 0.2);
    }

    .search svg {
      width: 20px;
      height: 20px;
      color: var(--muted);
      flex: 0 0 auto;
    }

    .search input {
      width: 100%;
      border: 0;
      outline: none;
      font-size: 1.1rem;
      font-family: inherit;
      background: transparent;
      color: #e4e9f0;
    }

    .search input::placeholder {
      color: var(--muted);
      letter-spacing: 0.3px;
    }

    .title {
      margin: 0 0 120px;
      text-align: center;
      letter-spacing: 2px;
      font-size: clamp(2rem, 5vw, 2.75rem);
      font-family: "Special Elite", monospace;
      color: var(--line);
      text-shadow: 0 0 14px rgba(141, 255, 189, 0.7);
    }

    .modes {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 34px 90px;
      max-width: 680px;
      margin: 0 auto;
      align-items: center;
    }

    .mode-btn {
      border: 2px solid var(--line-soft);
      padding: 16px 10px;
      font-size: 1.15rem;
      font-family: inherit;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: transparent;
      color: #e6e9ee;
      cursor: pointer;
      transition: background-color 150ms ease, color 150ms ease, transform 120ms ease, text-shadow 150ms ease;
    }

    .mode-btn:hover {
      background: rgba(255, 255, 255, 0.05);
      color: #f9fcff;
    }

    .mode-btn.primary {
      color: var(--line);
      text-shadow: 0 0 8px rgba(141, 255, 189, 0.5);
    }

    .mode-btn.primary:hover {
      background: rgba(28, 255, 122, 0.1);
    }

    .mode-btn:active {
      transform: translateY(1px);
    }

    .local {
      grid-column: 1 / 3;
      justify-self: center;
      width: min(280px, 100%);
    }

    @media (max-width: 760px) {
      .site-header {
        padding: 16px 14px;
      }

      .nav {
        gap: 12px;
      }

      .nav a {
        font-size: 0.95rem;
      }

      .frame {
        margin-top: 24px;
        padding: 20px 14px 22px;
      }

      .top {
        margin-bottom: 42px;
      }

      .title {
        margin-bottom: 58px;
      }

      .modes {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .local {
        grid-column: auto;
        width: 100%;
      }
    }

    @keyframes fade-in {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <header class="site-header" aria-label="Primary navigation">
    <h2 class="brand">RUNTIME TERROR</h2>
    <nav class="nav">
      <a href="./index.html">Home</a>
      <a href="./index.html#docs">Docs</a>
      <a href="./index.html#leaderboard">Leaderboard</a>
      <a href="./game-search.html">Game</a>
      <a href="./profile-settings.html">Profile</a>
      <a href="./login.html">Login</a>
      <a href="./signup.html">Sign Up</a>
    </nav>
  </header>

  <main class="frame">
    <div class="top">
      <label class="search" aria-label="Search games">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="16.65" y1="16.65" x2="21" y2="21"></line>
        </svg>
        <input type="search" placeholder="Search" />
      </label>
    </div>

    <h1 class="title">Game</h1>

    <section class="modes" aria-label="Game modes">
      <button class="mode-btn primary" type="button" data-href="./game.html">Solo</button>
      <button class="mode-btn" type="button" disabled>Multiplayer</button>
      <button class="mode-btn local" type="button" disabled>Local</button>
    </section>
  </main>
  <script type="module" src="./nav.js"></script>
  <script>
    document.querySelectorAll("[data-href]").forEach((button) => {
      button.addEventListener("click", () => {
        window.location.href = button.dataset.href;
      });
    });
  </script>
</body>
</html>
