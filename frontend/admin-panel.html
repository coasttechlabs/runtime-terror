<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Runtime Terror - Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0d11;
      --panel: #12161c;
      --line: #1cff7a;
      --line-soft: rgba(28, 255, 122, 0.45);
      --text: #d9dce2;
      --muted: #8c93a3;
      --warn: #ff8f8f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Share Tech Mono", monospace;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 8%, rgba(34, 66, 45, 0.25), transparent 46%),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.01), rgba(255, 255, 255, 0.01) 2px, transparent 2px, transparent 36px),
        linear-gradient(180deg, #0f1319 0%, #080b0f 100%);
      display: flex;
      flex-direction: column;
    }

    .site-header {
      border-bottom: 2px solid var(--line);
      padding: 18px 38px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: rgba(8, 11, 15, 0.78);
      backdrop-filter: blur(4px);
    }

    .brand {
      margin: 0;
      color: var(--line);
      font-family: "Special Elite", monospace;
      letter-spacing: 2px;
      font-size: clamp(1.4rem, 2.7vw, 2.2rem);
      text-shadow: 0 0 9px rgba(141, 255, 189, 0.55);
    }

    .nav {
      display: flex;
      gap: 34px;
      flex-wrap: wrap;
    }

    .nav a {
      color: #f2f2f2;
      text-decoration: none;
      font-size: clamp(1rem, 1.6vw, 1.45rem);
      font-family: "Special Elite", monospace;
      opacity: 0.92;
      transition: opacity 140ms ease, text-shadow 140ms ease;
    }

    .nav a:hover {
      opacity: 1;
      text-shadow: 0 0 8px rgba(141, 255, 189, 0.38);
    }

    .frame {
      margin: 34px auto 30px;
      width: min(1100px, calc(100% - 24px));
      background: var(--panel);
      border: 2px solid var(--line-soft);
      box-shadow: 0 0 0 1px rgba(28, 255, 122, 0.18), 0 12px 40px rgba(0, 0, 0, 0.42);
      padding: 28px;
      animation: fade-in 340ms ease-out;
    }

    h1 {
      margin: 0 0 16px;
      letter-spacing: 2px;
      font-size: clamp(2rem, 5vw, 2.75rem);
      font-family: "Special Elite", monospace;
      color: var(--line);
      text-shadow: 0 0 14px rgba(141, 255, 189, 0.7);
    }

    .meta {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .status {
      min-height: 20px;
      margin: 0 0 18px;
      color: var(--muted);
    }

    .status.ok { color: var(--line); }
    .status.err { color: var(--warn); }

    .tools {
      border: 2px solid var(--line-soft);
      background: rgba(5, 7, 10, 0.32);
      padding: 14px;
      margin-bottom: 18px;
    }

    .actions {
      display: grid;
      grid-template-columns: 2fr auto;
      gap: 10px;
      margin-bottom: 10px;
    }

    .actions.compact {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .input-wrap {
      border: 2px solid rgba(188, 199, 224, 0.44);
      background: rgba(5, 7, 10, 0.45);
      transition: border-color 120ms ease, box-shadow 120ms ease;
    }

    .input-wrap:focus-within {
      border-color: var(--line);
      box-shadow: 0 0 0 2px rgba(28, 255, 122, 0.2);
    }

    input, select {
      width: 100%;
      border: 0;
      padding: 12px 10px;
      font-size: 1rem;
      outline: none;
      font-family: inherit;
      background: transparent;
      color: #e4e9f0;
    }

    button {
      border: 2px solid var(--line-soft);
      padding: 12px 10px;
      font-size: 0.95rem;
      font-family: inherit;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      background: transparent;
      color: #e6e9ee;
      cursor: pointer;
      transition: background-color 150ms ease, color 150ms ease;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.05);
      color: #f9fcff;
    }

    button.primary {
      color: var(--line);
      text-shadow: 0 0 8px rgba(141, 255, 189, 0.5);
    }

    button.primary:hover {
      background: rgba(28, 255, 122, 0.1);
    }

    .user-list {
      border: 2px solid var(--line-soft);
      background: rgba(5, 7, 10, 0.24);
      padding: 12px;
    }

    .user-row {
      display: grid;
      grid-template-columns: minmax(0, 1.8fr) auto;
      gap: 14px;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(188, 199, 224, 0.2);
    }

    .user-row:last-child {
      border-bottom: 0;
    }

    .user-pill {
      border: 2px solid var(--line-soft);
      border-radius: 999px;
      padding: 16px 22px;
      background: rgba(255, 255, 255, 0.03);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-width: 0;
    }

    .user-name {
      font-size: 1.05rem;
      color: #f2f2f2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-meta {
      color: var(--muted);
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .list-actions,
    .modal-actions,
    .command-grid {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .list-actions button,
    .modal-actions button {
      min-width: 140px;
      border-radius: 999px;
    }

    .empty-state {
      padding: 18px 10px;
      color: var(--muted);
    }

    .modal {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(3, 5, 7, 0.8);
      z-index: 20;
    }

    .modal-card {
      width: min(760px, 100%);
      max-height: min(90vh, 900px);
      overflow: auto;
      background: linear-gradient(180deg, rgba(15, 19, 25, 0.98), rgba(8, 11, 15, 0.98));
      border: 2px solid var(--line-soft);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.5);
      padding: 22px;
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 18px;
    }

    .modal-title {
      margin: 0;
      font-size: clamp(1.4rem, 3.4vw, 2rem);
      color: var(--line);
      font-family: "Special Elite", monospace;
      letter-spacing: 1px;
    }

    .close-btn {
      min-width: auto;
      padding-inline: 16px;
    }

    .profile-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .profile-card {
      border: 2px solid rgba(188, 199, 224, 0.2);
      background: rgba(255, 255, 255, 0.03);
      padding: 12px;
    }

    .profile-card strong {
      display: block;
      color: var(--line);
      margin-bottom: 6px;
      text-transform: uppercase;
      font-size: 0.82rem;
      letter-spacing: 1px;
    }

    .command-panel {
      border-top: 1px solid rgba(188, 199, 224, 0.2);
      padding-top: 18px;
    }

    .command-grid {
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .command-grid button,
    .command-grid .input-wrap {
      flex: 1 1 180px;
    }

    .hidden { display: none; }

    @media (max-width: 860px) {
      .site-header { padding: 16px 14px; }
      .nav { gap: 12px; }
      .nav a { font-size: 0.95rem; }
      .frame { padding: 16px; }
      .actions { grid-template-columns: 1fr; }
      .actions.compact { grid-template-columns: 1fr; }
      .user-row { grid-template-columns: 1fr; }
      .user-pill { border-radius: 28px; }
      .list-actions { justify-content: stretch; }
      .profile-grid { grid-template-columns: 1fr; }
      button { width: 100%; }
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <header class="site-header" aria-label="Primary navigation">
    <h2 class="brand">RUNTIME TERROR</h2>
    <nav class="nav">
      <a href="./index.html">Home</a>
      <a href="./index.html#docs">Docs</a>
      <a href="./index.html#leaderboard">Leaderboard</a>
      <a href="./game-search.html">Game</a>
      <a href="./profile-settings.html">Profile</a>
      <a href="./login.html">Login</a>
      <a href="./signup.html">Sign Up</a>
    </nav>
  </header>

  <main class="frame">
    <h1>Admin Panel</h1>
    <p id="admin-meta" class="meta">Checking permissions...</p>
    <p id="status" class="status">Sign in with an admin-level account.</p>

    <section id="tools" class="tools hidden" aria-label="Admin tools">
      <div class="actions">
        <label class="input-wrap">
          <input id="lookup" type="text" placeholder="Find user by uid, username, or email" />
        </label>
        <button id="search-users" class="primary" type="button">Search</button>
      </div>
      <div class="actions compact">
        <button id="refresh-users" type="button">Refresh List</button>
        <button id="view-search-result" type="button">View User</button>
      </div>
      <small>Search for a user, then open their profile for commands.</small>
    </section>

    <section id="table-wrap" class="user-list hidden" aria-label="User list">
      <div id="rows"></div>
    </section>
  </main>

  <section id="user-modal" class="modal hidden" aria-label="User profile panel" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-head">
        <div>
          <h2 id="modal-title" class="modal-title">User Profile</h2>
          <p id="modal-subtitle" class="meta">Loading user details...</p>
        </div>
        <button id="close-modal" class="close-btn" type="button">Close</button>
      </div>

      <div id="profile-grid" class="profile-grid"></div>

      <section class="command-panel" aria-label="User commands">
        <p class="meta">Commands write to `users/{uid}`.</p>
        <div class="modal-actions">
          <label class="input-wrap">
            <select id="modal-rank">
              <option value="player">player</option>
              <option value="unranked">unranked</option>
              <option value="mod">mod</option>
              <option value="admin">admin</option>
              <option value="Co-Owner">Co-Owner</option>
              <option value="owner">owner</option>
              <option value="banned">banned</option>
            </select>
          </label>
          <button id="apply-rank" class="primary" type="button">Update Rank</button>
        </div>
        <div class="command-grid">
          <button id="cmd-add-level" type="button">Add Level</button>
          <button id="cmd-remove-level" type="button">Remove Level</button>
          <button id="cmd-ban" type="button" style="color: var(--warn); border-color: var(--warn);">Ban User</button>
        </div>
      </section>
    </div>
  </section>

  <script type="module" src="./nav.js"></script>
  <script type="module">
    import { auth } from "./firebase.js";
    import { getApiBase } from "./api-base.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    const API_BASE = getApiBase();

    const adminMeta = document.getElementById("admin-meta");
    const statusEl = document.getElementById("status");
    const tools = document.getElementById("tools");
    const tableWrap = document.getElementById("table-wrap");
    const rows = document.getElementById("rows");
    const lookupInput = document.getElementById("lookup");
    const searchUsersButton = document.getElementById("search-users");
    const refreshUsersButton = document.getElementById("refresh-users");
    const viewSearchResultButton = document.getElementById("view-search-result");
    const applyRankButton = document.getElementById("apply-rank");
    const addLevelBtn = document.getElementById("cmd-add-level");
    const removeLevelBtn = document.getElementById("cmd-remove-level");
    const banBtn = document.getElementById("cmd-ban");
    const modal = document.getElementById("user-modal");
    const closeModalButton = document.getElementById("close-modal");
    const modalSubtitle = document.getElementById("modal-subtitle");
    const profileGrid = document.getElementById("profile-grid");
    const modalRank = document.getElementById("modal-rank");

    let activeIdToken = "";
    let cache = [];
    let activeUser = null;

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function setStatus(message, type = "") {
      statusEl.textContent = message;
      statusEl.classList.remove("ok", "err");
      if (type) statusEl.classList.add(type);
    }

    async function apiRequest(path, { method = "GET", token = "", body = null } = {}) {
      const headers = {};
      if (token) headers.Authorization = `Bearer ${token}`;
      if (body !== null) headers["Content-Type"] = "application/json";

      const response = await fetch(`${API_BASE}${path}`, {
        method,
        headers,
        body: body === null ? undefined : JSON.stringify(body)
      });

      let payload = null;
      let rawText = "";
      try {
        rawText = await response.text();
        payload = rawText ? JSON.parse(rawText) : null;
      } catch (_error) {
        payload = null;
      }

      if (!response.ok) {
        const message =
          payload?.detail ||
          payload?.rank?.[0] ||
          (rawText ? rawText.slice(0, 200) : "") ||
          `Request failed (${response.status})`;
        throw new Error(message);
      }

      return payload;
    }

    async function updateRankForUid(uid, rankValue) {
      const result = await apiRequest(`/admin/users/${encodeURIComponent(uid)}/rank`, {
        method: "PATCH",
        token: activeIdToken,
        body: { rank: rankValue }
      });
      return result.user;
    }

    async function updateUserFields(uid, fields) {
      const result = await apiRequest(`/admin/users/${encodeURIComponent(uid)}`, {
        method: "PATCH",
        token: activeIdToken,
        body: fields
      });
      return result.user;
    }

    async function findUser(identifier) {
      const raw = identifier.trim();
      if (!raw) return null;
      const result = await apiRequest(`/admin/users?search=${encodeURIComponent(raw)}&limit=1`, {
        token: activeIdToken
      });
      return result.users?.[0] || null;
    }

    async function getFullUser(uid) {
      const result = await apiRequest(`/admin/users/${encodeURIComponent(uid)}`, {
        token: activeIdToken
      });
      const data = result.user || {};
      return {
        uid,
        username: data.username || "",
        email: data.email || "",
        rank: data.rank || "unranked",
        role: data.role || "player",
        level: Number(data.level || 0),
        currentStreak: Number(data.currentStreak || 0),
        longestStreak: Number(data.longestStreak || data.longeststreak || 0),
        tutorialCompleted: Boolean(data.tutorialCompleted),
      };
    }

    function updateCachedUser(user) {
      const index = cache.findIndex((entry) => entry.uid === user.uid);
      const summary = {
        uid: user.uid,
        username: user.username,
        email: user.email,
        rank: user.rank,
      };

      if (index === -1) {
        cache.unshift(summary);
      } else {
        cache[index] = { ...cache[index], ...summary };
      }
    }

    function renderProfile(user) {
      const fields = [
        ["Username", user.username || "-"],
        ["Email", user.email || "-"],
        ["UID", user.uid],
        ["Rank", user.rank || "unranked"],
        ["Role", user.role || "player"],
        ["Level", String(user.level ?? 0)],
        ["Current Streak", String(user.currentStreak ?? 0)],
        ["Longest Streak", String(user.longestStreak ?? 0)],
        ["Tutorial Completed", user.tutorialCompleted ? "Yes" : "No"],
      ];

      profileGrid.innerHTML = fields
        .map(
          ([label, value]) => `
            <div class="profile-card">
              <strong>${escapeHtml(label)}</strong>
              <span>${escapeHtml(value)}</span>
            </div>
          `
        )
        .join("");
      modalSubtitle.textContent = `Managing ${user.username || user.uid}`;
      modalRank.value = user.rank || "unranked";
    }

    async function openUserModal(uid) {
      modal.classList.remove("hidden");
      modal.setAttribute("aria-hidden", "false");
      profileGrid.innerHTML = "";
      modalSubtitle.textContent = "Loading user details...";
      activeUser = null;

      try {
        const user = await getFullUser(uid);
        activeUser = user;
        updateCachedUser(user);
        renderProfile(user);
        renderRows(cache);
      } catch (error) {
        console.error("User modal load error:", error);
        setStatus(error?.message || "Failed to load user profile.", "err");
        closeUserModal();
      }
    }

    function closeUserModal() {
      modal.classList.add("hidden");
      modal.setAttribute("aria-hidden", "true");
      activeUser = null;
      profileGrid.innerHTML = "";
    }

    function renderRows(users) {
      rows.innerHTML = "";
      if (users.length === 0) {
        const empty = document.createElement("p");
        empty.className = "empty-state";
        empty.textContent = "No users available.";
        rows.appendChild(empty);
        return;
      }

      users.forEach((user) => {
        const row = document.createElement("article");
        row.className = "user-row";
        row.dataset.uid = user.uid;

        const pill = document.createElement("div");
        pill.className = "user-pill";
        pill.innerHTML = `
          <div>
            <div class="user-name">${escapeHtml(user.username || user.uid)}</div>
            <div class="user-meta">${escapeHtml(user.email || user.uid)} | rank: ${escapeHtml(user.rank || "unranked")}</div>
          </div>
        `;

        const actions = document.createElement("div");
        actions.className = "list-actions";

        const view = document.createElement("button");
        view.type = "button";
        view.className = "primary";
        view.textContent = "View";
        view.addEventListener("click", () => {
          openUserModal(user.uid);
        });

        actions.appendChild(view);
        row.appendChild(pill);
        row.appendChild(actions);
        rows.appendChild(row);
      });
    }

    async function loadUsers() {
      const result = await apiRequest("/admin/users?limit=50", { token: activeIdToken });
      cache = result.users || [];
      renderRows(cache);
    }

    async function refreshActiveUser() {
      if (!activeUser?.uid) return;
      const latest = await getFullUser(activeUser.uid);
      activeUser = latest;
      updateCachedUser(latest);
      renderProfile(latest);
      renderRows(cache);
    }

    applyRankButton.addEventListener("click", async () => {
      if (!activeUser?.uid) {
        setStatus("Open a user profile first.", "err");
        return;
      }

      applyRankButton.disabled = true;
      try {
        await updateRankForUid(activeUser.uid, modalRank.value);
        await refreshActiveUser();
        setStatus(`Updated ${activeUser.username || activeUser.uid} to rank ${modalRank.value}.`, "ok");
      } catch (error) {
        console.error("Apply rank error:", error);
        setStatus(error?.message || "Failed to apply rank.", "err");
      } finally {
        applyRankButton.disabled = false;
      }
    });

    addLevelBtn.addEventListener("click", async () => {
      if (!activeUser?.uid) return setStatus("Open a user profile first.", "err");
      addLevelBtn.disabled = true;
      try {
        const newLevel = Number(activeUser.level || 0) + 1;
        await updateUserFields(activeUser.uid, { level: newLevel });
        await refreshActiveUser();
        setStatus(`Increased level for ${activeUser.username || activeUser.uid} to ${newLevel}.`, "ok");
      } catch (e) {
        setStatus(e?.message || "Failed to increase level.", "err");
      } finally {
        addLevelBtn.disabled = false;
      }
    });

    removeLevelBtn.addEventListener("click", async () => {
      if (!activeUser?.uid) return setStatus("Open a user profile first.", "err");
      removeLevelBtn.disabled = true;
      try {
        const current = Number(activeUser.level || 1);
        const newLevel = current > 1 ? current - 1 : 1;
        if (current === newLevel) {
          setStatus(`User is already at minimum level.`, "err");
          return;
        }
        await updateUserFields(activeUser.uid, { level: newLevel });
        await refreshActiveUser();
        setStatus(`Decreased level for ${activeUser.username || activeUser.uid} to ${newLevel}.`, "ok");
      } catch (e) {
        setStatus(e?.message || "Failed to decrease level.", "err");
      } finally {
        removeLevelBtn.disabled = false;
      }
    });

    banBtn.addEventListener("click", async () => {
      if (!activeUser?.uid) return setStatus("Open a user profile first.", "err");
      if (!confirm("Are you sure you want to ban this user?")) return;
      banBtn.disabled = true;
      try {
        await updateRankForUid(activeUser.uid, "banned");
        await refreshActiveUser();
        setStatus(`User ${activeUser.username || activeUser.uid} has been banned.`, "ok");
      } catch (e) {
        setStatus(e?.message || "Failed to ban user.", "err");
      } finally {
        banBtn.disabled = false;
      }
    });

    searchUsersButton.addEventListener("click", async () => {
      const identifier = lookupInput.value.trim();
      if (!identifier) {
        await loadUsers();
        setStatus("Showing recent users.", "ok");
        return;
      }

      searchUsersButton.disabled = true;
      try {
        const user = await findUser(identifier);
        cache = user ? [user] : [];
        renderRows(cache);
        setStatus(user ? `Found ${user.username || user.uid}.` : "User not found.", user ? "ok" : "err");
      } catch (error) {
        console.error("Search error:", error);
        setStatus(error?.message || "Failed to search users.", "err");
      } finally {
        searchUsersButton.disabled = false;
      }
    });

    refreshUsersButton.addEventListener("click", async () => {
      refreshUsersButton.disabled = true;
      try {
        lookupInput.value = "";
        await loadUsers();
        setStatus("User list refreshed.", "ok");
      } catch (error) {
        setStatus(error?.message || "Failed to refresh users.", "err");
      } finally {
        refreshUsersButton.disabled = false;
      }
    });

    viewSearchResultButton.addEventListener("click", async () => {
      const identifier = lookupInput.value.trim();
      if (!identifier) {
        setStatus("Enter uid, username, or email first.", "err");
        return;
      }

      viewSearchResultButton.disabled = true;
      try {
        const user = await findUser(identifier);
        if (!user) {
          setStatus("User not found.", "err");
          return;
        }
        cache = [user, ...cache.filter((entry) => entry.uid !== user.uid)];
        renderRows(cache);
        await openUserModal(user.uid);
        setStatus(`Opened ${user.username || user.uid}.`, "ok");
      } catch (error) {
        console.error("View search result error:", error);
        setStatus(error?.message || "Failed to open user profile.", "err");
      } finally {
        viewSearchResultButton.disabled = false;
      }
    });

    closeModalButton.addEventListener("click", closeUserModal);
    modal.addEventListener("click", (event) => {
      if (event.target === modal) {
        closeUserModal();
      }
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        activeIdToken = "";
        adminMeta.textContent = "Not logged in.";
        tools.classList.add("hidden");
        tableWrap.classList.add("hidden");
        closeUserModal();
        setStatus("Log in with an admin account to access this page.", "err");
        return;
      }

      try {
        activeIdToken = await user.getIdToken(true);
        const me = await apiRequest("/admin/me", { token: activeIdToken });
        adminMeta.textContent = `Signed in as ${me.email || me.uid}. Admin: ${me.admin ? "yes" : "no"}`;

        tools.classList.remove("hidden");
        tableWrap.classList.remove("hidden");
        setStatus("Admin access granted.", "ok");
        await loadUsers();
      } catch (error) {
        console.error("Admin panel load error:", error);
        tools.classList.add("hidden");
        tableWrap.classList.add("hidden");
        closeUserModal();
        setStatus(error?.message || "Failed to load admin panel.", "err");
      }
    });
  </script>
</body>
</html>
