<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Runtime Terror - Solo Battle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: "Share Tech Mono", monospace;
      background: #000;
      color: white;
    }

    .arena-screen {
      min-height: 100vh;
    }

    .arena-frame {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .arena-canvas {
      width: 100%;
      height: 100%;
      display: block;
      cursor: crosshair;
    }

    .bot-selection-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }

    .bot-selection-container {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      justify-content: center;
      margin-top: 2rem;
    }

    .bot-card {
      border: 2px solid #444;
      padding: 1rem;
      width: 200px;
      height: 120px;
      cursor: pointer;
      transition: all 0.2s ease-in-out;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #222;
    }

    .bot-card:hover {
      border-color: #fff;
      transform: scale(1.05);
      background-color: #333;
    }

    .bot-card h3 {
      margin: 0;
      font-family: "Special Elite", monospace;
    }

    .support {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .game-over-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .game-over-actions {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <section id="bot-selection-screen" class="bot-selection-screen">
    <h2>Select Your Bot</h2>
    <div id="bot-selection-container" class="bot-selection-container">
      <!-- Bot cards will be generated by JS -->
    </div>
  </section>
  <section id="game-over-screen" class="game-over-screen hidden">
    <h2 id="game-over-title">Game Over</h2>
    <p id="game-over-message"></p>
    <div class="game-over-actions">
      <button id="play-again-button" type="button">Fight Again</button>
      <button id="profile-button" type="button">Profile</button>
    </div>
  </section>
  <main id="arena-screen" class="arena-screen hidden">
    <section class="arena-frame" aria-label="Solo arena">
      <canvas id="arena-canvas" class="arena-canvas" width="1280" height="720"></canvas>

      <section class="support" aria-hidden="true">
        <button id="start-battle" type="button">Start</button>
        <button id="reset-save" type="button">Reset</button>
        <div id="encounter-value"></div>
        <div id="money-value"></div>
        <div id="record-value"></div>
        <div id="difficulty-value"></div>
        <div id="battle-log"></div>
        <div id="player-health-text"></div>
        <div id="enemy-health-text"></div>
        <div id="player-health-bar"></div>
        <div id="enemy-health-bar"></div>
        <div id="player-cooldown-bar"></div>
        <div id="enemy-cooldown-bar"></div>
        <div id="player-stats"></div>
        <div id="enemy-stats"></div>
        <div id="player-status"></div>
        <div id="enemy-status"></div>
        <div id="enemy-name"></div>
        <button id="fire-button" type="button">Fire</button>
        <button id="ability-button" type="button">Ability</button>
        <div id="upgrade-shop"></div>
        <div id="berserk-shop"></div>
        <div id="unique-inventory"></div>
      </section>
    </section>
  </main>

  <script src="./game.js" defer></script>
</body>
</html>
