<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Runtime Terror - Profile Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0d11;
      --panel: #12161c;
      --line: #1cff7a;
      --line-soft: rgba(28, 255, 122, 0.45);
      --text: #d9dce2;
      --muted: #8c93a3;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Share Tech Mono", monospace;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 8%, rgba(34, 66, 45, 0.25), transparent 46%),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.01), rgba(255, 255, 255, 0.01) 2px, transparent 2px, transparent 36px),
        linear-gradient(180deg, #0f1319 0%, #080b0f 100%);
      display: flex;
      flex-direction: column;
    }

    .site-header {
      border-bottom: 2px solid var(--line);
      padding: 18px 38px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: rgba(8, 11, 15, 0.78);
      backdrop-filter: blur(4px);
    }

    .brand {
      margin: 0;
      color: var(--line);
      font-family: "Special Elite", monospace;
      letter-spacing: 2px;
      font-size: clamp(1.4rem, 2.7vw, 2.2rem);
      text-shadow: 0 0 9px rgba(141, 255, 189, 0.55);
    }

    .nav {
      display: flex;
      gap: 34px;
      flex-wrap: wrap;
    }

    .nav a {
      color: #f2f2f2;
      text-decoration: none;
      font-size: clamp(1rem, 1.6vw, 1.45rem);
      font-family: "Special Elite", monospace;
      opacity: 0.92;
      transition: opacity 140ms ease, text-shadow 140ms ease;
    }

    .nav a:hover {
      opacity: 1;
      text-shadow: 0 0 8px rgba(141, 255, 189, 0.38);
    }

    .frame {
      margin: 52px auto 30px;
      width: min(1320px, calc(100% - 28px));
      min-height: 600px;
      background: var(--panel);
      border: 2px solid var(--line-soft);
      box-shadow: 0 0 0 1px rgba(28, 255, 122, 0.18), 0 12px 40px rgba(0, 0, 0, 0.42);
      overflow: hidden;
      display: grid;
      grid-template-columns: 96px 1fr;
      animation: fade-in 380ms ease-out;
    }

    .side {
      border-right: 2px solid var(--line-soft);
      display: grid;
      grid-template-rows: 88px 88px 88px 1fr;
    }

    .side-btn {
      border: 0;
      border-bottom: 2px solid var(--line-soft);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: background-color 150ms ease, color 150ms ease;
    }

    .side-btn:hover {
      background: rgba(255, 255, 255, 0.05);
      color: #f9fcff;
    }

    .side-btn.active {
      color: var(--line);
      text-shadow: 0 0 8px rgba(141, 255, 189, 0.5);
      background: rgba(28, 255, 122, 0.08);
    }

    .side-btn svg {
      width: 32px;
      height: 32px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
    }

    .content {
      padding: 36px 40px 34px;
    }

    h1 {
      margin: 0 0 30px;
      letter-spacing: 2px;
      font-size: clamp(2rem, 5vw, 2.75rem);
      font-family: "Special Elite", monospace;
      color: var(--line);
      text-shadow: 0 0 14px rgba(141, 255, 189, 0.7);
    }

    .form-grid {
      display: grid;
      gap: 20px;
    }

    .input-wrap {
      border: 2px solid rgba(188, 199, 224, 0.44);
      background: rgba(5, 7, 10, 0.45);
      transition: border-color 120ms ease, box-shadow 120ms ease;
    }

    .input-wrap:focus-within {
      border-color: var(--line);
      box-shadow: 0 0 0 2px rgba(28, 255, 122, 0.2);
    }

    input {
      width: 100%;
      border: 0;
      padding: 16px 14px;
      font-size: 1.1rem;
      outline: none;
      font-family: inherit;
      background: transparent;
      color: #e4e9f0;
    }

    input::placeholder {
      color: var(--muted);
      letter-spacing: 0.3px;
    }

    .actions {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      max-width: 520px;
    }

    .profile-status {
      margin: -8px 0 10px;
      min-height: 20px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .profile-status.ok {
      color: var(--line);
    }

    .profile-status.err {
      color: #ff8f8f;
    }

    .toggles {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
    }

    .toggles input {
      width: auto;
      accent-color: var(--line);
      transform: scale(1.1);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      border: 1px solid rgba(188, 199, 224, 0.25);
      background: rgba(255, 255, 255, 0.03);
      padding: 10px 12px;
    }

    .stat-label {
      color: var(--muted);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .stat-value {
      margin-top: 6px;
      color: #e6e9ee;
      font-size: 1rem;
    }

    .friends {
      border: 2px solid var(--line-soft);
      padding: 18px;
      background: rgba(5, 7, 10, 0.32);
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    .placeholder-panel {
      border: 2px solid var(--line-soft);
      padding: 18px;
      background: rgba(5, 7, 10, 0.32);
      color: var(--muted);
      min-height: 260px;
    }

    .friends h2 {
      margin: 0 0 14px;
      font-size: 1.15rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--line);
      text-shadow: 0 0 8px rgba(141, 255, 189, 0.35);
    }

    .friend-add {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      margin-bottom: 14px;
    }

    .friend-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .friend-section-title {
      margin: 16px 0 10px;
      color: var(--muted);
      font-size: 0.86rem;
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }

    .friend-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .friend-actions {
      display: inline-flex;
      gap: 6px;
    }

    .mini-btn {
      border: 1px solid var(--line-soft);
      background: rgba(255, 255, 255, 0.03);
      color: #e6e9ee;
      padding: 6px 10px;
      font-family: inherit;
      font-size: 0.82rem;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
    }

    .mini-btn:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .mini-btn.accept {
      color: var(--line);
      border-color: rgba(28, 255, 122, 0.5);
    }

    .friend-chip {
      border: 1px solid rgba(188, 199, 224, 0.44);
      padding: 8px 12px;
      color: #e6e9ee;
      background: rgba(255, 255, 255, 0.03);
      font-size: 0.95rem;
    }

    .friends-status {
      margin: 0 0 12px;
      min-height: 20px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .friends-status.ok {
      color: var(--line);
    }

    .friends-status.err {
      color: #ff8f8f;
    }

    .action-btn {
      border: 2px solid var(--line-soft);
      padding: 16px 10px;
      font-size: 1.05rem;
      font-family: inherit;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: transparent;
      color: #e6e9ee;
      cursor: pointer;
      transition: background-color 150ms ease, color 150ms ease, transform 120ms ease, text-shadow 150ms ease;
    }

    .action-btn:hover {
      background: rgba(255, 255, 255, 0.05);
      color: #f9fcff;
    }

    .action-btn.primary {
      color: var(--line);
      text-shadow: 0 0 8px rgba(141, 255, 189, 0.5);
    }

    .action-btn.primary:hover {
      background: rgba(28, 255, 122, 0.1);
    }

    .action-btn:active {
      transform: translateY(1px);
    }

    /* Upgrade Menu Styles */
    .upgrade-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
      margin-bottom: 24px;
    }

    .section-header {
      margin: 24px 0 16px;
      font-size: 1.15rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--line);
      text-shadow: 0 0 8px rgba(141, 255, 189, 0.35);
      border-bottom: 1px solid var(--line-soft);
      padding-bottom: 8px;
    }

    .upgrade-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--line-soft);
      border-radius: 4px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .upgrade-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.4);
      border-color: var(--line);
    }

    .upgrade-card-header {
      padding: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(0, 0, 0, 0.25);
    }

    .upgrade-icon {
      width: 42px;
      height: 42px;
      object-fit: contain;
      background: #000;
      border: 1px solid #333;
      padding: 4px;
      border-radius: 4px;
    }

    .upgrade-card h3 {
      margin: 0;
      font-size: 1rem;
      color: #e6e9ee;
      letter-spacing: 0.5px;
      font-family: "Share Tech Mono", monospace;
    }

    .upgrade-body {
      padding: 14px;
      flex: 1;
    }

    .upgrade-stat-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 0.9rem;
    }

    .upgrade-stat-label { color: var(--muted); }
    .upgrade-stat-value { color: var(--line); font-weight: bold; }
    .upgrade-stat-value.plus { color: #ffd166; }
    
    .upgrade-desc {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.4;
      margin-top: 10px;
    }

    .berserk-card { border-left: 3px solid #ff4d4d; }
    .berserk-card .upgrade-stat-value { color: #ff4d4d; }

    @media (max-width: 760px) {
      .site-header {
        padding: 16px 14px;
      }

      .nav {
        gap: 12px;
      }

      .nav a {
        font-size: 0.95rem;
      }

      .frame {
        margin-top: 24px;
        grid-template-columns: 1fr;
      }

      .side {
        grid-template-columns: 1fr 1fr 1fr;
        grid-template-rows: 68px;
        border-right: 0;
        border-bottom: 2px solid var(--line-soft);
      }

      .side-btn {
        border-bottom: 0;
        border-right: 2px solid var(--line-soft);
      }

      .side-btn:last-child {
        border-right: 0;
      }

      .content {
        padding: 24px 14px 22px;
      }

      .actions {
        grid-template-columns: 1fr;
        max-width: none;
      }

      .friend-add {
        grid-template-columns: 1fr;
      }
    }

    @keyframes fade-in {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <header class="site-header" aria-label="Primary navigation">
    <h2 class="brand">RUNTIME TERROR</h2>
    <nav class="nav">
      <a href="./index.html">Home</a>
      <a href="./index.html#docs">Docs</a>
      <a href="./index.html#leaderboard">Leaderboard</a>
      <a href="./game-search.html">Game</a>
      <a href="./profile-settings.html">Profile</a>
      <a href="./login.html">Login</a>
      <a href="./signup.html">Sign Up</a>
    </nav>
  </header>

  <main class="frame">
    <aside class="side" aria-label="Profile sections">
      <button class="side-btn active" type="button" aria-label="Profile" data-tab="profile">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="7.5" r="3.5"></circle>
          <path d="M5 20c0-3.5 3-6 7-6s7 2.5 7 6"></path>
        </svg>
      </button>
      <button class="side-btn" type="button" aria-label="Favorites" data-tab="friends">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 20s-7-4.4-7-10a4 4 0 0 1 7-2.5A4 4 0 0 1 19 10c0 5.6-7 10-7 10z"></path>
        </svg>
      </button>
      <button class="side-btn" type="button" aria-label="Bot Upgrades" data-tab="upgrades">
        <svg viewBox="0 0 24 24" aria-hidden="true" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect>
          <rect x="9" y="9" width="6" height="6"></rect>
          <line x1="9" y1="1" x2="9" y2="4"></line>
          <line x1="15" y1="1" x2="15" y2="4"></line>
          <line x1="9" y1="20" x2="9" y2="23"></line>
          <line x1="15" y1="20" x2="15" y2="23"></line>
          <line x1="20" y1="9" x2="23" y2="9"></line>
          <line x1="20" y1="14" x2="23" y2="14"></line>
          <line x1="1" y1="9" x2="4" y2="9"></line>
          <line x1="1" y1="14" x2="4" y2="14"></line>
        </svg>
      </button>
    </aside>

    <section class="content" aria-label="Account settings">
      <h1>Profile Settings</h1>
      <section class="tab-panel active" id="panel-profile" aria-label="Profile tab">
        <form class="form-grid">
          <p class="profile-status" id="profile-status">Log in to edit your profile.</p>
          <label class="input-wrap">
            <input id="display-name" type="text" placeholder="Display Name" maxlength="32" />
          </label>
          <label class="input-wrap">
            <input id="email-address" type="email" placeholder="Email Address" />
          </label>
          <label class="toggles">
            <input id="tutorial-completed" type="checkbox" />
            Tutorial Completed
          </label>
          <div class="stats-grid" aria-label="Profile stats">
            <div class="stat">
              <div class="stat-label">Rank</div>
              <div class="stat-value" id="profile-rank">-</div>
            </div>
            <div class="stat">
              <div class="stat-label">Role</div>
              <div class="stat-value" id="profile-role">-</div>
            </div>
            <div class="stat">
              <div class="stat-label">Level</div>
              <div class="stat-value" id="profile-level">0</div>
            </div>
            <div class="stat">
              <div class="stat-label">Current Streak</div>
              <div class="stat-value" id="profile-current-streak">0</div>
            </div>
            <div class="stat">
              <div class="stat-label">Longest Streak</div>
              <div class="stat-value" id="profile-longest-streak">0</div>
            </div>
          </div>
          <div class="actions">
            <button id="save-profile-btn" class="action-btn primary" type="button">Save</button>
            <button id="change-password-btn" class="action-btn" type="button">Change Password</button>
          </div>
        </form>
      </section>

      <section class="tab-panel" id="panel-friends" aria-label="Friends tab">
        <section class="friends" aria-label="Friends">
          <h2>Friends</h2>
          <p class="friends-status" id="friends-status">Send a friend request by username or email.</p>
          <div class="friend-add">
            <label class="input-wrap">
              <input id="friend-input" type="text" placeholder="Friend username or email" />
            </label>
            <button id="add-friend-btn" class="action-btn primary" type="button">Add Friend</button>
          </div>
          <p class="friend-section-title">Pending Requests</p>
          <div class="friend-list" id="friend-list" aria-label="Pending friend requests"></div>
          <p class="friend-section-title">Added Friends</p>
          <div class="friend-list" id="friend-added-list" aria-label="Added friends"></div>
        </section>
      </section>

      <section class="tab-panel" id="panel-upgrades" aria-label="Bot upgrades tab">
        <h2 class="section-header">Core Modules</h2>
        <div id="core-modules" class="upgrade-grid"></div>
        <h2 class="section-header">Berserk Upgrades</h2>
        <div id="berserk-modules" class="upgrade-grid"></div>
      </section>
    </section>
  </main>
  <script type="module" src="./nav.js"></script>
  <script type="module">
    import { auth, db } from "./firebase.js";
    import { getApiBase } from "./api-base.js";
    import { onAuthStateChanged, sendPasswordResetEmail, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const USERS_COLLECTION = "users";
    const API_BASE = getApiBase();

    const friendInput = document.getElementById("friend-input");
    const addFriendButton = document.getElementById("add-friend-btn");
    const friendList = document.getElementById("friend-list");
    const friendAddedList = document.getElementById("friend-added-list");
    const friendsStatus = document.getElementById("friends-status");
    const profileStatus = document.getElementById("profile-status");
    const displayNameInput = document.getElementById("display-name");
    const emailInput = document.getElementById("email-address");
    const tutorialCompletedInput = document.getElementById("tutorial-completed");
    const saveProfileButton = document.getElementById("save-profile-btn");
    const changePasswordButton = document.getElementById("change-password-btn");
    const rankValue = document.getElementById("profile-rank");
    const roleValue = document.getElementById("profile-role");
    const levelValue = document.getElementById("profile-level");
    const currentStreakValue = document.getElementById("profile-current-streak");
    const longestStreakValue = document.getElementById("profile-longest-streak");
    const sideButtons = Array.from(document.querySelectorAll(".side-btn[data-tab]"));
    const tabPanels = {
      profile: document.getElementById("panel-profile"),
      friends: document.getElementById("panel-friends"),
      upgrades: document.getElementById("panel-upgrades")
    };

    let currentUser = null;
    let currentProfile = null;
    let friendRequestsIntervalId = null;
    let outgoingRequests = [];
    let incomingRequests = [];
    let pendingRenderToken = 0;
    let activeIdToken = "";

    function setActiveTab(tabName) {
      sideButtons.forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.tab === tabName);
      });

      Object.entries(tabPanels).forEach(([name, panel]) => {
        panel.classList.toggle("active", name === tabName);
      });
    }

    function setProfileStatus(message, type = "") {
      profileStatus.textContent = message;
      profileStatus.classList.remove("ok", "err");
      if (type) {
        profileStatus.classList.add(type);
      }
    }

    function extractApiError(payload, status) {
      if (payload?.detail && typeof payload.detail === "string") return payload.detail;
      if (payload && typeof payload === "object") {
        for (const value of Object.values(payload)) {
          if (typeof value === "string") return value;
          if (Array.isArray(value) && value.length > 0) return String(value[0]);
        }
      }
      return `Request failed (${status})`;
    }

    async function apiRequest(path, { method = "GET", token = "", body = null } = {}) {
      const headers = {};
      if (token) headers.Authorization = `Bearer ${token}`;
      if (body !== null) headers["Content-Type"] = "application/json";

      const response = await fetch(`${API_BASE}${path}`, {
        method,
        headers,
        body: body === null ? undefined : JSON.stringify(body)
      });

      let payload = null;
      try {
        payload = await response.json();
      } catch (_error) {
        payload = null;
      }

      if (!response.ok) {
        throw new Error(extractApiError(payload, response.status));
      }

      return payload;
    }

    function toNumber(value, fallback = 0) {
      const n = Number(value);
      return Number.isFinite(n) ? n : fallback;
    }

    function longestStreakFrom(profile) {
      return profile?.longestStreak ?? profile?.longeststreak ?? 0;
    }

    function hydrateProfileForm(profile, user) {
      displayNameInput.value = profile?.username || user?.displayName || "";
      emailInput.value = profile?.email || user?.email || "";
      tutorialCompletedInput.checked = Boolean(profile?.tutorialCompleted);

      rankValue.textContent = profile?.rank || "unranked";
      roleValue.textContent = profile?.role || "player";
      levelValue.textContent = String(toNumber(profile?.level, 0));
      currentStreakValue.textContent = String(toNumber(profile?.currentStreak, 0));
      longestStreakValue.textContent = String(toNumber(longestStreakFrom(profile), 0));
    }

    function setProfileInputsDisabled(disabled) {
      displayNameInput.disabled = disabled;
      emailInput.disabled = disabled;
      tutorialCompletedInput.disabled = disabled;
      saveProfileButton.disabled = disabled;
      changePasswordButton.disabled = disabled;
    }

    function setStatus(message, type = "") {
      friendsStatus.textContent = message;
      friendsStatus.classList.remove("ok", "err");
      if (type) {
        friendsStatus.classList.add(type);
      }
    }

    function chip(text) {
      const span = document.createElement("span");
      span.className = "friend-chip";
      span.textContent = text;
      return span;
    }

    function clearFriendRequestListeners() {
      pendingRenderToken += 1;
      if (friendRequestsIntervalId) {
        clearInterval(friendRequestsIntervalId);
        friendRequestsIntervalId = null;
      }
      outgoingRequests = [];
      incomingRequests = [];
    }

    const usernameCache = new Map();

    async function usernameFor(uid) {
      if (!uid) return "unknown";
      if (usernameCache.has(uid)) return usernameCache.get(uid);
      let name = uid;
      try {
        const snapshot = await getDoc(doc(db, USERS_COLLECTION, uid));
        name = snapshot.exists() ? (snapshot.data().username || uid) : uid;
      } catch (error) {
        if (error?.code !== "permission-denied") {
          throw error;
        }
      }
      usernameCache.set(uid, name);
      return name;
    }

    async function renderPendingRequests() {
      if (!currentUser) return;

      const renderToken = ++pendingRenderToken;
      const outgoingSnapshot = [...outgoingRequests];
      const incomingSnapshot = [...incomingRequests];

      const outgoingPending = await Promise.all(
        outgoingSnapshot
          .filter((entry) => entry.status === "pending")
          .map(async (entry) => chip("Sent: @" + (entry.toUsername || await usernameFor(entry.touserid))))
      );

      if (renderToken !== pendingRenderToken) return;

      const incomingPending = incomingSnapshot.filter((entry) => entry.status === "pending");
      const fragment = document.createDocumentFragment();
      const addedFragment = document.createDocumentFragment();
      const acceptedByUid = new Map();

      outgoingSnapshot
        .filter((entry) => entry.status === "accepted" && entry.touserid)
        .forEach((entry) => {
          acceptedByUid.set(entry.touserid, entry.toUsername || "");
        });
      incomingSnapshot
        .filter((entry) => entry.status === "accepted" && entry.fromuserid)
        .forEach((entry) => {
          acceptedByUid.set(entry.fromuserid, entry.fromUsername || "");
        });

      const addedFriends = await Promise.all(
        Array.from(acceptedByUid.entries()).map(async ([uid, hintedName]) => {
          const name = hintedName || await usernameFor(uid);
          return chip("@" + name);
        })
      );

      if (renderToken !== pendingRenderToken) return;

      if (outgoingPending.length === 0 && incomingPending.length === 0) {
        fragment.appendChild(chip("No pending requests"));
      } else {
        outgoingPending.forEach((item) => fragment.appendChild(item));

        for (const entry of incomingPending) {
          const item = document.createElement("div");
          item.className = "friend-item";

          const sender = entry.fromUsername || await usernameFor(entry.fromuserid);
          if (renderToken !== pendingRenderToken) return;
          item.appendChild(chip("Incoming: @" + sender));

          const actions = document.createElement("div");
          actions.className = "friend-actions";

          const accept = document.createElement("button");
          accept.type = "button";
          accept.className = "mini-btn accept";
          accept.textContent = "Accept";
          accept.addEventListener("click", () => respondToRequest(entry.id, "accepted"));

          const decline = document.createElement("button");
          decline.type = "button";
          decline.className = "mini-btn";
          decline.textContent = "Decline";
          decline.addEventListener("click", () => respondToRequest(entry.id, "declined"));

          actions.appendChild(accept);
          actions.appendChild(decline);
          item.appendChild(actions);
          fragment.appendChild(item);
        }
      }

      if (addedFriends.length === 0) {
        addedFragment.appendChild(chip("No friends added yet"));
      } else {
        for (const item of addedFriends) {
          addedFragment.appendChild(item);
        }
      }

      if (renderToken !== pendingRenderToken) return;
      friendList.replaceChildren(fragment);
      friendAddedList.replaceChildren(addedFragment);
    }

    async function refreshFriendRequests() {
      if (!currentUser) return;
      activeIdToken = await currentUser.getIdToken();
      const payload = await apiRequest("/friends/requests", { token: activeIdToken });
      outgoingRequests = Array.isArray(payload?.outgoing) ? payload.outgoing : [];
      incomingRequests = Array.isArray(payload?.incoming) ? payload.incoming : [];
      await renderPendingRequests();
    }

    function watchFriendRequests() {
      clearFriendRequestListeners();
      if (!currentUser) return;
      refreshFriendRequests().catch((error) => {
        console.error("Friend requests load error:", error);
        setStatus(error?.message || "Failed to load friend requests.", "err");
      });
      friendRequestsIntervalId = setInterval(() => {
        refreshFriendRequests().catch((error) => {
          console.error("Friend requests refresh error:", error);
        });
      }, 10000);
    }

    // --- Upgrade Menu Logic ---
    const STAT_MODULES = [
      { key: "damage", name: "Damage Module", base: 7.5, unit: "% Damage" },
      { key: "health", name: "Health Module", base: 7.5, unit: "% Health" },
      { key: "armor", name: "Armour Module", base: 7.5, unit: "% Damage Taken", inverse: true },
      { key: "speed", name: "Speed Module", base: 10, unit: "% Speed" }
    ];

    const BERSERKS = [
      {
        key: "elemental",
        tier: 2,
        name: "Elemental Module Tier 2",
        description: "-10% health.<br>+10% Elemental Damage.",
      },
      {
        key: "freeze",
        tier: 4,
        name: "Freeze Module Tier 4",
        description: "Freeze enemy for 5s (no move/shoot).<br>Self-inflicts 40 damage on use.",
      },
      {
        key: "striker",
        tier: 6,
        name: "Striker Module Tier 6",
        description: "3x Fire Rate for 5s.<br>+30% Damage Taken while active.",
      },
      {
        key: "golden",
        tier: 7,
        name: "Golden Module Tier 7",
        description: "90% Deflection Chance.<br>40% Reflect Chance (0.5x dmg).<br>-40% Movement Speed.<br>-30% Fire Rate.<br>Lasts 7 seconds.",
      }
    ];

    function calculateStat(base, tier, isPlus) {
      const doubled = base * Math.pow(2, tier - 1);
      const extra = isPlus ? 2.5 : 0;
      return doubled + extra;
    }

    function renderUpgrades() {
      const coreContainer = document.getElementById('core-modules');
      const berserkContainer = document.getElementById('berserk-modules');
      
      if (!coreContainer || !berserkContainer) return;
      
      coreContainer.innerHTML = "";
      berserkContainer.innerHTML = "";

      STAT_MODULES.forEach(mod => {
        const valT1 = calculateStat(mod.base, 1, false);
        const valT1Plus = calculateStat(mod.base, 1, true);
        const sign = mod.inverse ? '-' : '+';
        
        const card = document.createElement('div');
        card.className = 'upgrade-card';
        card.innerHTML = `
          <div class="upgrade-card-header">
            <img src="compressed-images/${mod.key}.png" alt="${mod.name}" class="upgrade-icon" onerror="this.style.display='none'">
            <h3>${mod.name}</h3>
          </div>
          <div class="upgrade-body">
            <div class="upgrade-stat-row">
              <span class="upgrade-stat-label">Tier 1</span>
              <span class="upgrade-stat-value">${sign}${valT1}${mod.unit}</span>
            </div>
            <div class="upgrade-stat-row">
              <span class="upgrade-stat-label">Tier 1+</span>
              <span class="upgrade-stat-value plus">${sign}${valT1Plus}${mod.unit}</span>
            </div>
            <div class="upgrade-desc">Upgrades double stats per tier. (+) variants add 2.5%.</div>
          </div>
        `;
        coreContainer.appendChild(card);
      });

      BERSERKS.forEach(mod => {
        const card = document.createElement('div');
        card.className = 'upgrade-card berserk-card';
        card.innerHTML = `
          <div class="upgrade-card-header">
            <img src="compressed-images/${mod.key}.png" alt="${mod.name}" class="upgrade-icon" onerror="this.style.display='none'">
            <h3>${mod.name}</h3>
          </div>
          <div class="upgrade-body">
            <div class="upgrade-stat-row">
              <span class="upgrade-stat-label" style="color:#ff6a57">Requirement</span>
              <span class="upgrade-stat-value">Tier ${mod.tier}</span>
            </div>
            <div class="upgrade-desc">${mod.description}</div>
          </div>
        `;
        berserkContainer.appendChild(card);
      });
    }

    sideButtons.forEach((btn) => {
      btn.addEventListener("click", () => {
        setActiveTab(btn.dataset.tab || "profile");
      });
    });
    
    // Initial render call
    renderUpgrades();

    async function respondToRequest(requestId, status) {
      if (!requestId || !currentUser) return;
      try {
        activeIdToken = await currentUser.getIdToken();
        await apiRequest(`/friends/requests/${encodeURIComponent(requestId)}`, {
          method: "PATCH",
          token: activeIdToken,
          body: { status }
        });
        await refreshFriendRequests();
        setStatus(
          status === "accepted" ? "Friend request accepted." : "Friend request declined.",
          "ok"
        );
      } catch (error) {
        console.error("Friend request response error:", error);
        setStatus(error?.message || "Failed to update friend request.", "err");
      }
    }

    saveProfileButton.addEventListener("click", async () => {
      if (!currentUser) {
        setProfileStatus("Log in to edit your profile.", "err");
        return;
      }

      const username = displayNameInput.value.trim();
      const email = emailInput.value.trim().toLowerCase();
      if (username.length < 2 || username.length > 32) {
        setProfileStatus("Display name must be between 2 and 32 characters.", "err");
        return;
      }
      if (!email) {
        setProfileStatus("Email is required.", "err");
        return;
      }

      saveProfileButton.disabled = true;
      setProfileStatus("Saving profile...");
      try {
        activeIdToken = await currentUser.getIdToken();
        const payload = await apiRequest("/profile/me", {
          method: "PATCH",
          token: activeIdToken,
          body: {
            username,
            email,
            tutorialCompleted: tutorialCompletedInput.checked
          }
        });

        await updateProfile(currentUser, { displayName: username });
        if (auth.currentUser) {
          await auth.currentUser.getIdToken(true);
          await auth.currentUser.reload();
        }

        currentProfile = payload?.profile || {
          ...(currentProfile || {}),
          username,
          email,
          tutorialCompleted: tutorialCompletedInput.checked
        };
        hydrateProfileForm(currentProfile, currentUser);
        setProfileStatus("Profile saved.", "ok");
      } catch (error) {
        console.error("Profile save error:", error);
        setProfileStatus(error?.message || "Failed to save profile.", "err");
      } finally {
        saveProfileButton.disabled = false;
      }
    });

    changePasswordButton.addEventListener("click", async () => {
      if (!currentUser?.email) {
        setProfileStatus("No email is linked to this account.", "err");
        return;
      }
      changePasswordButton.disabled = true;
      setProfileStatus("Sending password reset email...");
      try {
        await sendPasswordResetEmail(auth, currentUser.email);
        setProfileStatus("Password reset email sent.", "ok");
      } catch (error) {
        console.error("Password reset error:", error);
        setProfileStatus(error?.message || "Failed to send password reset email.", "err");
      } finally {
        changePasswordButton.disabled = false;
      }
    });

    addFriendButton.addEventListener("click", async () => {
      const identifier = friendInput.value.trim();
      if (!identifier) {
        setStatus("Enter a username or email first.", "err");
        return;
      }
      if (!currentUser || !currentProfile) {
        setStatus("You must be logged in to add friends.", "err");
        return;
      }

      addFriendButton.disabled = true;
      setStatus("Sending request...");
      try {
        activeIdToken = await currentUser.getIdToken();
        await apiRequest("/friends/requests", {
          method: "POST",
          token: activeIdToken,
          body: { identifier }
        });
        await refreshFriendRequests();
        friendInput.value = "";
        setStatus("Friend request sent.", "ok");
      } catch (error) {
        console.error("Friend request error:", error);
        setStatus(error?.message || "Failed to send friend request.", "err");
      } finally {
        addFriendButton.disabled = false;
      }
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        currentUser = null;
        currentProfile = null;
        activeIdToken = "";
        clearFriendRequestListeners();
        setProfileInputsDisabled(true);
        displayNameInput.value = "";
        emailInput.value = "";
        tutorialCompletedInput.checked = false;
        rankValue.textContent = "-";
        roleValue.textContent = "-";
        levelValue.textContent = "0";
        currentStreakValue.textContent = "0";
        longestStreakValue.textContent = "0";
        setProfileStatus("Log in to edit your profile.", "err");
        setStatus("Log in to send friend requests.", "err");
        addFriendButton.disabled = true;
        friendInput.disabled = true;
        friendList.innerHTML = "";
        friendList.appendChild(chip("Not logged in"));
        friendAddedList.innerHTML = "";
        friendAddedList.appendChild(chip("Not logged in"));
        return;
      }

      currentUser = user;
      setProfileInputsDisabled(false);
      try {
        activeIdToken = await user.getIdToken();
        const payload = await apiRequest("/profile/me", { token: activeIdToken });
        currentProfile = payload?.profile || {};
        hydrateProfileForm(currentProfile, user);
        setProfileStatus("Loaded profile settings.");
      } catch (error) {
        console.error("Profile load error:", error);
        try {
          const me = await getDoc(doc(db, USERS_COLLECTION, user.uid));
          currentProfile = me.exists() ? me.data() : {};
        } catch (_fallbackError) {
          currentProfile = {};
        }
        hydrateProfileForm(currentProfile, user);
        setProfileStatus(error?.message || "Profile loaded with limited access.", "err");
      }
      friendInput.disabled = false;
      addFriendButton.disabled = false;
      setStatus("Send a friend request by username or email.");
      watchFriendRequests();
    });
  </script>
</body>
</html>
