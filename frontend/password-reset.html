<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Runtime Terror - Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0d11;
      --panel: #12161c;
      --line: #1cff7a;
      --line-soft: rgba(28, 255, 122, 0.45);
      --text: #d9dce2;
      --muted: #8c93a3;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Share Tech Mono", monospace;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 8%, rgba(34, 66, 45, 0.25), transparent 46%),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.01), rgba(255, 255, 255, 0.01) 2px, transparent 2px, transparent 36px),
        linear-gradient(180deg, #0f1319 0%, #080b0f 100%);
      display: flex;
      flex-direction: column;
    }

    .site-header {
      border-bottom: 2px solid var(--line);
      padding: 18px 38px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: rgba(8, 11, 15, 0.78);
      backdrop-filter: blur(4px);
    }

    .brand {
      margin: 0;
      color: var(--line);
      font-family: "Special Elite", monospace;
      letter-spacing: 2px;
      font-size: clamp(1.4rem, 2.7vw, 2.2rem);
      text-shadow: 0 0 9px rgba(141, 255, 189, 0.55);
    }

    .nav {
      display: flex;
      gap: 34px;
      flex-wrap: wrap;
    }

    .nav a {
      color: #f2f2f2;
      text-decoration: none;
      font-size: clamp(1rem, 1.6vw, 1.45rem);
      font-family: "Special Elite", monospace;
      opacity: 0.92;
      transition: opacity 140ms ease, text-shadow 140ms ease;
    }

    .nav a:hover {
      opacity: 1;
      text-shadow: 0 0 8px rgba(141, 255, 189, 0.38);
    }

    .card {
      margin: 52px auto 30px;
      width: min(760px, calc(100% - 24px));
      background: var(--panel);
      border: 2px solid var(--line-soft);
      box-shadow: 0 0 0 1px rgba(28, 255, 122, 0.18), 0 12px 40px rgba(0, 0, 0, 0.42);
      overflow: hidden;
      animation: fade-in 380ms ease-out;
    }

    .card-inner {
      padding: 34px 28px 30px;
    }

    h1 {
      margin: 0 0 24px;
      text-align: center;
      letter-spacing: 2px;
      font-size: clamp(2rem, 5vw, 2.75rem);
      font-family: "Special Elite", monospace;
      color: var(--line);
      text-shadow: 0 0 14px rgba(141, 255, 189, 0.7);
    }

    .subtitle {
      margin: 0 auto 28px;
      max-width: 560px;
      text-align: center;
      color: #a5aabc;
      line-height: 1.5;
      font-size: clamp(1rem, 2.1vw, 1.28rem);
    }

    form {
      width: min(560px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .input-wrap {
      border: 2px solid rgba(188, 199, 224, 0.44);
      background: rgba(5, 7, 10, 0.45);
      transition: border-color 120ms ease, box-shadow 120ms ease;
    }

    .input-wrap:focus-within {
      border-color: var(--line);
      box-shadow: 0 0 0 2px rgba(28, 255, 122, 0.2);
    }

    input {
      width: 100%;
      border: 0;
      padding: 16px 14px;
      font-size: 1.15rem;
      outline: none;
      font-family: inherit;
      background: transparent;
      color: #e4e9f0;
    }

    input::placeholder {
      color: var(--muted);
      letter-spacing: 0.3px;
    }

    .status {
      min-height: 1.5rem;
      text-align: center;
      font-size: 1rem;
      color: #a5aabc;
    }

    .status.ok {
      color: #8dffbd;
    }

    .status.err {
      color: #ff8f8f;
    }

    .actions {
      border-top: 2px solid var(--line-soft);
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    button {
      border: 0;
      border-right: 2px solid var(--line-soft);
      padding: 18px 10px;
      font-size: 1.15rem;
      font-family: inherit;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: transparent;
      color: #e6e9ee;
      cursor: pointer;
      transition: background-color 150ms ease, color 150ms ease, transform 120ms ease, text-shadow 150ms ease;
    }

    button:last-child {
      border-right: 0;
    }

    .primary {
      color: var(--line);
      text-shadow: 0 0 8px rgba(141, 255, 189, 0.5);
    }

    .primary:hover {
      background: rgba(28, 255, 122, 0.1);
    }

    .secondary:hover {
      background: rgba(255, 255, 255, 0.05);
      color: #f9fcff;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      text-shadow: none;
    }

    button:active {
      transform: translateY(1px);
    }

    @media (max-width: 640px) {
      .site-header {
        padding: 16px 14px;
      }

      .nav {
        gap: 12px;
      }

      .nav a {
        font-size: 0.95rem;
      }

      .card {
        margin-top: 24px;
      }

      .card-inner {
        padding: 24px 14px 18px;
      }

      form {
        gap: 12px;
      }

      button {
        font-size: 0.88rem;
        padding: 15px 8px;
      }
    }

    @keyframes fade-in {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <header class="site-header" aria-label="Primary navigation">
    <h2 class="brand">RUNTIME TERROR</h2>
    <nav class="nav">
      <a href="./index.html">Home</a>
      <a href="./index.html#docs">Docs</a>
      <a href="./index.html#leaderboard">Leaderboard</a>
      <a href="./game-search.html">Game</a>
      <a href="./profile-settings.html">Profile</a>
      <a href="./admin-panel.html">Admin</a>
      <a href="./login.html">Login</a>
      <a href="./signup.html">Sign Up</a>
    </nav>
  </header>

  <main class="card" aria-label="Reset password panel">
    <div class="card-inner">
      <h1>Reset Password</h1>
      <p class="subtitle">Enter your new password to finish resetting your account.</p>

      <form id="password-reset-form" method="post" action="./password-reset.html">
        <label class="input-wrap">
          <input id="new-password" name="newPassword" type="password" placeholder="New password" required minlength="6" />
        </label>

        <label class="input-wrap">
          <input id="confirm-password" name="confirmPassword" type="password" placeholder="Repeat new password" required minlength="6" />
        </label>
      </form>

      <p id="status-message" class="status" role="status" aria-live="polite"></p>
    </div>

    <section class="actions" aria-label="Reset actions">
      <button class="primary" id="submit-button" type="submit" form="password-reset-form">Save Password</button>
      <button class="secondary" id="login-button" type="button">Back to Login</button>
    </section>
  </main>

  <script type="module" src="./nav.js"></script>
  <script type="module">
    import { auth } from "./firebase.js";
    import {
      confirmPasswordReset,
      verifyPasswordResetCode,
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    const form = document.getElementById("password-reset-form");
    const loginButton = document.getElementById("login-button");
    const submitButton = document.getElementById("submit-button");
    const statusMessage = document.getElementById("status-message");

    const params = new URLSearchParams(window.location.search);
    const resetCode = params.get("oobCode");

    function setStatus(message, variant = "") {
      statusMessage.textContent = message;
      statusMessage.className = `status ${variant}`.trim();
    }

    async function validateResetCode() {
      if (!resetCode) {
        form.querySelectorAll("input").forEach((input) => {
          input.disabled = true;
        });
        submitButton.disabled = true;
        setStatus("Missing reset code. Request a new reset email and try again.", "err");
        return;
      }

      try {
        await verifyPasswordResetCode(auth, resetCode);
      } catch (error) {
        console.error("Invalid reset code:", error);
        form.querySelectorAll("input").forEach((input) => {
          input.disabled = true;
        });
        submitButton.disabled = true;
        setStatus("This reset link is invalid or expired. Request a new one.", "err");
      }
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const newPassword = document.getElementById("new-password").value;
      const confirmPassword = document.getElementById("confirm-password").value;

      if (newPassword !== confirmPassword) {
        setStatus("Passwords do not match.", "err");
        return;
      }

      submitButton.disabled = true;
      setStatus("Saving new password...");

      try {
        await confirmPasswordReset(auth, resetCode, newPassword);
        setStatus("Password updated. Redirecting to login...", "ok");
        setTimeout(() => {
          window.location.href = "./login.html";
        }, 1200);
      } catch (error) {
        console.error("Password reset error:", error);
        setStatus(error?.message || "Failed to reset password.", "err");
        submitButton.disabled = false;
      }
    });

    loginButton.addEventListener("click", () => {
      window.location.href = "./login.html";
    });

    validateResetCode();
  </script>
</body>
</html>
